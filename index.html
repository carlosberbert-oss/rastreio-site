<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreio de Pedidos</title>
<style>
  @import url("https://rsms.me/inter/inter.css");

  :root {
    --bg-1: #ffffff;
    --bg-2: #f5f5f7;
    --bg-3: #fbfbfd;
    --fg-1: #1d1d1f;
    --fg-2: #6e6e73;
    --fg-3: #86868b;
    --divider: #d2d2d7;
    --divider-soft: #ececef;

    --accent: #0071e3;
    --accent-hover: #0077ed;
    --accent-soft: rgba(0,113,227,0.08);

    --success: #29a745;
    --warning: #ff9f0a;
    --danger: #ff3b30;

    --fitlog: #5a9e2f;
    --mira: #d6336c;

    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);

    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Helvetica Neue", sans-serif;
    --ease: cubic-bezier(0.4, 0.0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: linear-gradient(180deg, #f5f5f7 0%, #ffffff 100%);
    min-height: 100vh;
    color: var(--fg-1);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.47;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 48px; }
  .header h1 {
    font-size: 36px;
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .header p {
    color: var(--fg-2);
    font-size: 16px;
    letter-spacing: -0.01em;
  }

  /* Card form */
  .card {
    background: var(--bg-1);
    border: 1px solid var(--divider);
    border-radius: 18px;
    padding: 32px;
    box-shadow: var(--shadow);
  }

  .label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg-2);
    margin-bottom: 8px;
    letter-spacing: -0.005em;
  }

  /* Carrier selector */
  .carrier-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .carrier-btn {
    background: var(--bg-1);
    border: 2px solid var(--divider);
    border-radius: 12px;
    padding: 16px 14px;
    cursor: pointer;
    font-family: var(--font);
    transition: all 150ms var(--ease);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .carrier-btn:hover { border-color: #b8b8bd; background: var(--bg-3); }
  .carrier-btn.active {
    border-color: var(--carrier-color, var(--accent));
    background: var(--carrier-bg, var(--accent-soft));
  }
  .carrier-btn .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--carrier-color, var(--accent));
  }
  .carrier-btn .name {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--fg-1);
  }
  .carrier-btn[data-carrier="FITLOG"] { --carrier-color: var(--fitlog); --carrier-bg: rgba(90,158,47,0.08); }
  .carrier-btn[data-carrier="MIRA"]   { --carrier-color: var(--mira);   --carrier-bg: rgba(214,51,108,0.08); }

  /* Input NF */
  .input-row {
    display: flex;
    gap: 10px;
  }
  .input-nf {
    flex: 1;
    padding: 14px 18px;
    font-size: 16px;
    border: 1px solid var(--divider);
    border-radius: 12px;
    background: var(--bg-1);
    font-family: var(--font);
    color: var(--fg-1);
    transition: border-color 150ms var(--ease), box-shadow 150ms var(--ease);
  }
  .input-nf::placeholder { color: var(--fg-3); }
  .input-nf:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(0,113,227,0.12);
  }
  .btn-primary {
    padding: 14px 24px;
    background: var(--fg-1);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.005em;
    cursor: pointer;
    font-family: var(--font);
    transition: background 150ms var(--ease), transform 100ms var(--ease);
    min-width: 120px;
  }
  .btn-primary:hover:not(:disabled) { background: #38383a; }
  .btn-primary:active:not(:disabled) { transform: scale(0.98); }
  .btn-primary:disabled {
    background: var(--divider);
    color: var(--fg-2);
    cursor: not-allowed;
  }

  /* Result wrapper */
  .result { margin-top: 24px; display: none; }
  .result.visible { display: block; animation: rise 320ms var(--ease); }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Resumo do envio */
  .summary-card {
    background: var(--bg-1);
    border: 1px solid var(--divider);
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }

  .summary-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--divider-soft);
  }
  .summary-head .nf-block {
    font-size: 13px;
    color: var(--fg-2);
  }
  .summary-head .nf-block b {
    color: var(--fg-1);
    font-weight: 500;
    font-size: 14px;
  }
  .carrier-tag {
    display: inline-block;
    padding: 4px 11px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .carrier-tag.FITLOG { background: rgba(90,158,47,0.1);  color: var(--fitlog); }
  .carrier-tag.MIRA   { background: rgba(214,51,108,0.1); color: var(--mira); }

  .current-status {
    text-align: center;
    padding: 18px 12px 8px;
  }
  .current-status .lbl {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--fg-3);
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .current-status .txt {
    font-size: 22px;
    font-weight: 600;
    color: var(--fg-1);
    letter-spacing: -0.02em;
    line-height: 1.25;
  }
  .current-status .txt.success { color: var(--success); }
  .current-status .txt.warning { color: var(--warning); }
  .current-status .txt.danger  { color: var(--danger); }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 22px;
  }
  .info-tile {
    background: var(--bg-2);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .info-tile.full { grid-column: 1 / -1; }
  .info-tile .k {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--fg-3);
    letter-spacing: 0.05em;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .info-tile .v {
    font-size: 13px;
    color: var(--fg-1);
    font-weight: 500;
    letter-spacing: -0.005em;
  }
  .info-tile .v.empty { color: var(--fg-3); font-weight: 400; }

  /* Botão de comprovante */
  .btn-comprovante {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 18px;
    padding: 14px 18px;
    background: var(--accent-soft);
    border: 1px solid rgba(0,113,227,0.15);
    border-radius: 12px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.005em;
    text-decoration: none;
    transition: background 150ms var(--ease), transform 100ms var(--ease), border-color 150ms var(--ease);
    cursor: pointer;
  }
  .btn-comprovante:hover {
    background: rgba(0,113,227,0.14);
    border-color: rgba(0,113,227,0.3);
  }
  .btn-comprovante:active {
    transform: scale(0.99);
  }
  .btn-comprovante svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .btn-comprovante span {
    flex: 1;
  }
  .btn-comprovante .arrow {
    width: 14px;
    height: 14px;
    opacity: 0.6;
  }
  .btn-comprovante:hover .arrow {
    opacity: 1;
  }

  /* Timeline */
  .timeline-card {
    background: var(--bg-1);
    border: 1px solid var(--divider);
    border-radius: 18px;
    padding: 24px;
    box-shadow: var(--shadow);
  }
  .timeline-title {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--fg-3);
    letter-spacing: 0.06em;
    font-weight: 500;
    margin-bottom: 20px;
  }
  .timeline {
    position: relative;
    padding-left: 22px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 5px;
    top: 6px;
    bottom: 6px;
    width: 2px;
    background: var(--divider);
    border-radius: 2px;
  }
  .ev {
    position: relative;
    padding: 0 0 24px 18px;
  }
  .ev:last-child { padding-bottom: 0; }
  .ev::before {
    content: '';
    position: absolute;
    left: -22px;
    top: 4px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--bg-1);
    border: 2px solid var(--divider);
    z-index: 1;
  }
  .ev.latest::before {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(0,113,227,0.18);
  }
  .ev.success::before {
    background: var(--success);
    border-color: var(--success);
    box-shadow: 0 0 0 4px rgba(41,167,69,0.18);
  }
  .ev.danger::before {
    background: var(--danger);
    border-color: var(--danger);
    box-shadow: 0 0 0 4px rgba(255,59,48,0.18);
  }

  .ev .head {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.3;
    color: var(--fg-1);
    margin-bottom: 5px;
  }
  .ev.latest .head { color: var(--accent); }
  .ev.success .head { color: var(--success); }
  .ev.danger .head { color: var(--danger); }

  .ev .meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--fg-2);
    margin-bottom: 6px;
    letter-spacing: -0.005em;
  }
  .ev .meta .sep { color: var(--fg-3); }
  .ev .desc {
    font-size: 13px;
    color: var(--fg-2);
    line-height: 1.5;
    letter-spacing: -0.005em;
  }

  /* Error */
  .error-card {
    background: rgba(255,59,48,0.04);
    border: 1px solid rgba(255,59,48,0.2);
    border-radius: 14px;
    padding: 18px 20px;
    color: var(--danger);
    font-size: 14px;
    line-height: 1.5;
    margin-top: 24px;
    display: none;
  }
  .error-card.visible { display: block; animation: rise 240ms var(--ease); }

  /* Spinner */
  .loading {
    display: none;
    text-align: center;
    padding: 32px 0;
  }
  .loading.visible { display: block; }
  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid var(--divider);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 12px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 13px;
    color: var(--fg-2);
    letter-spacing: -0.005em;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 40px;
    font-size: 12px;
    color: var(--fg-3);
    letter-spacing: -0.005em;
  }

  @media (max-width: 600px) {
    .container { padding: 32px 16px 60px; }
    .header h1 { font-size: 28px; }
    .header p  { font-size: 14px; }
    .card { padding: 22px; }
    .summary-card, .timeline-card { padding: 20px; }
    .input-row { flex-direction: column; }
    .btn-primary { width: 100%; }
    .info-grid { grid-template-columns: 1fr; }
    .current-status .txt { font-size: 19px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Rastreio de Pedidos</h1>
    <p>Acompanhe o status do seu pedido em tempo real</p>
  </div>

  <div class="card">
    <label class="label" for="inputNF">Número da Nota Fiscal</label>
    <div class="input-row">
      <input type="text" id="inputNF" class="input-nf" placeholder="Ex: 99812" inputmode="numeric" autocomplete="off"/>
      <button class="btn-primary" id="btnRastrear" onclick="rastrear()">Rastrear</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Procurando NF nas transportadoras…</div>
  </div>

  <div class="error-card" id="errorCard"></div>

  <div class="result" id="result">
    <!-- Resumo do envio -->
    <div class="summary-card">
      <div class="summary-head">
        <div class="nf-block">
          NF <b id="resNF">—</b>
        </div>
        <span class="carrier-tag" id="resCarrier">—</span>
      </div>

      <div class="current-status">
        <div class="lbl">Status atual</div>
        <div class="txt" id="resStatus">—</div>
      </div>

      <div class="info-grid">
        <div class="info-tile">
          <div class="k">Última atualização</div>
          <div class="v" id="resDataHora">—</div>
        </div>
        <div class="info-tile">
          <div class="k">Previsão de entrega</div>
          <div class="v" id="resPrevisao">—</div>
        </div>
        <div class="info-tile full" id="tileRemetente">
          <div class="k">Remetente</div>
          <div class="v" id="resRemetente">—</div>
        </div>
        <div class="info-tile full" id="tileDestinatario">
          <div class="k">Destinatário</div>
          <div class="v" id="resDestinatario">—</div>
        </div>
      </div>

      <!-- Botão de comprovante (só aparece quando disponível) -->
      <a id="btnComprovante" href="#" target="_blank" rel="noopener" class="btn-comprovante" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
        <span>Baixar comprovante de entrega</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="7 17 17 7"></polyline>
          <polyline points="7 7 17 7 17 17"></polyline>
        </svg>
      </a>
    </div>

    <!-- Linha do tempo -->
    <div class="timeline-card" id="timelineCard" style="display: none;">
      <div class="timeline-title">Histórico de movimentações</div>
      <div class="timeline" id="timeline"></div>
    </div>
  </div>

  <div class="footer">
    Powered by SSW · <span id="ts"></span>
  </div>

</div>

<script>
  document.getElementById("inputNF").addEventListener("keydown", (e) => {
    if (e.key === "Enter") rastrear();
  });

  async function rastrear() {
    const nf = document.getElementById("inputNF").value.trim().replace(/\D/g, "");
    if (!nf) {
      mostrarErro("Digite o número da nota fiscal");
      return;
    }

    document.getElementById("result").classList.remove("visible");
    document.getElementById("errorCard").classList.remove("visible");
    document.getElementById("loading").classList.add("visible");
    document.getElementById("btnRastrear").disabled = true;

    try {
      const url = `/api/rastrear?carrier=AUTO&nf=${encodeURIComponent(nf)}`;
      const resp = await fetch(url);
      const data = await resp.json();

      document.getElementById("loading").classList.remove("visible");
      document.getElementById("btnRastrear").disabled = false;

      if (!data.ok) {
        mostrarErro(data.erro || "Erro desconhecido");
        return;
      }

      mostrarResultado(data);

    } catch (err) {
      document.getElementById("loading").classList.remove("visible");
      document.getElementById("btnRastrear").disabled = false;
      mostrarErro("Falha ao consultar: " + err.message);
    }
  }

  function mostrarResultado(data) {
    document.getElementById("resNF").textContent       = data.nf;
    document.getElementById("resCarrier").textContent  = data.carrier;
    document.getElementById("resCarrier").className    = "carrier-tag " + data.carrier;

    // Status atual = último evento (ou statusAtual quando não tem timeline)
    const last = data.statusAtual || (data.eventos && data.eventos.length ? data.eventos[data.eventos.length - 1] : null);
    const statusTxt = last ? last.situacao : "—";

    const statusEl = document.getElementById("resStatus");
    statusEl.textContent = statusTxt;
    statusEl.className = "txt " + classeDoStatus(statusTxt);

    setValue("resDataHora",     last ? last.dataHora : "");
    setValue("resPrevisao",     data.previsao);
    setValue("resRemetente",    data.remetente);
    setValue("resDestinatario", data.destinatario);

    // Esconde tiles vazios
    document.getElementById("tileRemetente").style.display    = data.remetente    ? "" : "none";
    document.getElementById("tileDestinatario").style.display = data.destinatario ? "" : "none";

    // Botão de comprovante: só aparece quando o SSW tem o link
    const btnComp = document.getElementById("btnComprovante");
    if (data.comprovanteUrl) {
      btnComp.href = data.comprovanteUrl;
      btnComp.style.display = "flex";
    } else {
      btnComp.style.display = "none";
    }

    // Timeline
    const timeline = document.getElementById("timeline");
    timeline.innerHTML = "";
    const timelineCard = document.getElementById("timelineCard");

    if (data.eventos && data.eventos.length > 0) {
      // Ordem cronológica: mais antigo embaixo (formato Apple/iOS — mais recente em cima)
      const eventosOrdenados = [...data.eventos].reverse();

      eventosOrdenados.forEach((ev, idx) => {
        const div = document.createElement("div");
        div.className = "ev " + classeDoEvento(ev.situacao, idx === 0);

        const local = [ev.unidade, ev.filial].filter(Boolean).join(" · ");

        div.innerHTML = `
          <div class="head">${escapeHtml(ev.situacao || "—")}</div>
          <div class="meta">
            <span>${escapeHtml(ev.dataHora || "")}</span>
            ${local ? `<span class="sep">·</span><span>${escapeHtml(local)}</span>` : ""}
          </div>
          ${ev.descricao ? `<div class="desc">${escapeHtml(ev.descricao)}</div>` : ""}
        `;
        timeline.appendChild(div);
      });

      timelineCard.style.display = "";
    } else {
      timelineCard.style.display = "none";
    }

    document.getElementById("result").classList.add("visible");
  }

  function classeDoStatus(s) {
    const u = (s || "").toUpperCase();
    if (/ENTREG/.test(u) && !/N[AÃ]O/.test(u)) return "success";
    if (/RECUSA|NAO PODE|N[AÃ]O PODE|CANCEL|EXTRAVIO|AVARIA|DEVOLU/.test(u)) return "danger";
    if (/ROTA|SAIDA|SA[ÍI]DA|TR[AÂ]NSITO/.test(u)) return "success";
    if (/N[AÃ]O DISPON[IÍ]V/.test(u)) return "warning";
    return "";
  }

  function classeDoEvento(situacao, isLatest) {
    const cls = classeDoStatus(situacao);
    if (isLatest && !cls) return "latest";
    return cls + (isLatest && (cls === "success" || cls === "danger") ? "" : (isLatest ? " latest" : ""));
  }

  function setValue(id, val) {
    const el = document.getElementById(id);
    if (val && String(val).trim()) {
      el.textContent = val;
      el.classList.remove("empty");
    } else {
      el.textContent = "Não informado";
      el.classList.add("empty");
    }
  }

  function mostrarErro(msg) {
    const el = document.getElementById("errorCard");
    el.textContent = "✗ " + msg;
    el.classList.add("visible");
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
    }[c]));
  }

  document.getElementById("ts").textContent = new Date().getFullYear();
</script>

</body>
</html>
