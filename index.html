<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rastreio de Pedidos · Luuna</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Luuna blue */
    --navy-900:#0B2239; --navy-700:#16395C;
    --blue-700:#1B4F8A; --blue-600:#1F5C99; --blue-500:#2D6FB0;
    --blue-400:#4E8FC9; --blue-300:#8FB6D9; --blue-100:#E8F0FA;
    --accent:#1F5C99; --accent-hover:#256BB0;

    /* Light surfaces */
    --page:#F4F7FB;
    --surface:#FFFFFF;
    --tint:#EEF4FB;

    /* Ink */
    --ink:#0B2239;
    --ink-soft:#4A5E76;
    --ink-mute:#8295AB;

    --border:#E4EAF2;
    --border-strong:#D4DEEA;

    --gold:#F5C53D; --gold-soft:#FBE9A8;

    --success:#1F8A5B; --warning:#C9871F; --danger:#D64545;
    --fitlog:#5A9E2F; --mira:#C44C82;

    --shadow-sm:0 1px 2px rgba(15,44,73,.05);
    --shadow:0 4px 16px rgba(15,44,73,.07), 0 1px 3px rgba(15,44,73,.05);
    --shadow-lg:0 18px 48px rgba(15,44,73,.12), 0 4px 14px rgba(15,44,73,.06);
    --shadow-blue:0 10px 26px rgba(31,92,153,.32);

    --font:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
    --ease:cubic-bezier(.2,0,0,1);
    --ease-out:cubic-bezier(.16,1,.3,1);
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;}
  body{
    background:var(--page);
    background:radial-gradient(120% 80% at 50% -10%,#FFFFFF 0%,#EEF4FB 38%,#E7EFF8 100%);
    background-attachment:fixed;
    color:var(--ink);
    font-family:var(--font);
    font-size:14px;line-height:1.5;letter-spacing:-.01em;
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    min-height:100vh;
    position:relative;
  }

  /* ── soft organic brand shapes (Luuna mural feel) ── */
  .bg-blobs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .bg-blobs span{position:absolute;border-radius:48% 52% 57% 43% / 53% 45% 55% 47%;filter:blur(2px);opacity:.5;}
  .bg-blobs .b1{width:340px;height:300px;left:-120px;top:60px;background:radial-gradient(circle at 40% 40%,#DCE9F8,#E9F1FB);}
  .bg-blobs .b2{width:280px;height:260px;right:-110px;top:220px;background:radial-gradient(circle at 60% 40%,#E4EFFA,#EEF4FB);opacity:.7;}
  .bg-blobs .b3{width:200px;height:190px;right:60px;bottom:80px;background:radial-gradient(circle at 50% 50%,#FBEFC4,#FBF3D6);opacity:.45;}

  /* ─────────────────────────  INTRO / SPLASH  ───────────────────────── */
  #intro{
    position:fixed;inset:0;z-index:100;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
    background:radial-gradient(120% 90% at 50% 40%,#FFFFFF 0%,#EEF4FB 60%,#E3EDF7 100%);
    transition:opacity .7s var(--ease), visibility .7s var(--ease);
  }
  #intro.done{opacity:0;visibility:hidden;}

  .intro-mark{
    display:flex;align-items:flex-start;justify-content:center;
    opacity:0;transform:translateY(14px) scale(.97);
    animation:introMark 1s var(--ease-out) .15s forwards;
  }
  .wm{
    position:relative;display:inline-block;
    font-weight:700;letter-spacing:-1.5px;color:var(--navy-900);line-height:1;
  }
  .wm .moon{
    position:absolute;top:-.32em;right:-.46em;width:.26em;height:.26em;
    transform:rotate(8deg);
  }
  .intro-mark .wm{font-size:clamp(46px,9vw,82px);}
  @keyframes introMark{to{opacity:1;transform:none;}}

  .intro-sub{
    font-size:13px;font-weight:500;letter-spacing:2px;color:var(--blue-600);
    margin-top:6px;
    opacity:0;animation:introFade .7s var(--ease) .55s forwards;
  }
  @keyframes introFade{to{opacity:1;}}

  .intro-bar{
    width:160px;height:3px;border-radius:980px;background:rgba(31,92,153,.14);overflow:hidden;
    opacity:0;animation:introFade .6s var(--ease) .7s forwards;
  }
  .intro-bar i{
    display:block;height:100%;width:40%;border-radius:980px;
    background:linear-gradient(90deg,var(--blue-400),var(--blue-600));
    transform:translateX(-110%);
    animation:introLoad 1.25s var(--ease-out) .75s forwards;
  }
  @keyframes introLoad{to{transform:translateX(260%);}}

  /* ─────────────────────────  PAGE  ───────────────────────── */
  .container{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:60px 24px 90px;}

  /* entrance: hidden until revealed */
  .reveal{opacity:0;transform:translateY(18px);}
  body.revealed .reveal{
    animation:rise .8s var(--ease-out) forwards;
    animation-delay:var(--d,0s);
  }
  @keyframes rise{to{opacity:1;transform:none;}}

  /* Brand */
  .brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px;}
  .brand .wm{font-size:22px;letter-spacing:-.6px;}
  .brand .sep{width:1px;height:15px;background:var(--border-strong);}
  .brand .kicker{font-size:10px;font-weight:600;letter-spacing:3px;color:var(--blue-600);text-transform:uppercase;}

  /* Header */
  .header{text-align:center;margin-bottom:38px;}
  .header h1{font-size:42px;font-weight:700;letter-spacing:-1.8px;line-height:1.04;color:var(--navy-900);margin-bottom:12px;}
  .header p{color:var(--ink-soft);font-size:16px;letter-spacing:-.1px;}

  /* Card form */
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:18px;
    padding:32px;box-shadow:var(--shadow);
    transition:box-shadow .4s var(--ease);
  }

  .label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:10px;letter-spacing:-.005em;}

  /* Carrier selector */
  .carrier-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;}
  .carrier-btn{
    background:var(--surface);border:1.5px solid var(--border-strong);border-radius:13px;
    padding:16px 14px;cursor:pointer;font-family:var(--font);text-align:center;
    transition:border-color .22s var(--ease),background .22s var(--ease),transform .22s var(--ease-out),box-shadow .22s var(--ease);
    display:flex;align-items:center;justify-content:center;gap:10px;color:var(--ink);
  }
  .carrier-btn:hover{border-color:var(--blue-400);transform:translateY(-2px);box-shadow:var(--shadow);}
  .carrier-btn:active{transform:translateY(0);}
  .carrier-btn.active{border-color:var(--carrier-color,var(--accent));background:var(--carrier-bg,var(--blue-100));}
  .carrier-btn .dot{
    width:10px;height:10px;border-radius:50%;background:var(--carrier-color,var(--accent));
    transition:box-shadow .25s var(--ease);
  }
  .carrier-btn.active .dot{box-shadow:0 0 0 4px color-mix(in srgb,var(--carrier-color,var(--accent)) 20%,transparent);}
  .carrier-btn .name{font-size:15px;font-weight:600;letter-spacing:-.2px;color:var(--ink);}
  .carrier-btn[data-carrier="FITLOG"]{--carrier-color:var(--fitlog);--carrier-bg:rgba(90,158,47,.09);}
  .carrier-btn[data-carrier="MIRA"]{--carrier-color:var(--mira);--carrier-bg:rgba(196,76,130,.09);}

  /* Input NF */
  .input-row{display:flex;gap:12px;}
  .input-nf{
    flex:1;padding:15px 18px;font-size:16px;
    border:1.5px solid var(--border-strong);border-radius:13px;background:var(--surface);
    font-family:var(--font);color:var(--ink);
    transition:border-color .2s var(--ease),box-shadow .2s var(--ease);
  }
  .input-nf::placeholder{color:var(--ink-mute);}
  .input-nf:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(31,92,153,.14);}

  .btn-primary{
    position:relative;overflow:hidden;
    padding:15px 26px;background:var(--accent);color:#fff;border:none;border-radius:13px;
    font-size:15px;font-weight:600;letter-spacing:.1px;cursor:pointer;font-family:var(--font);
    transition:background .18s var(--ease),transform .12s var(--ease),box-shadow .25s var(--ease);
    min-width:128px;box-shadow:var(--shadow-blue);
  }
  .btn-primary:hover:not(:disabled){background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 14px 30px rgba(31,92,153,.36);}
  .btn-primary:active:not(:disabled){transform:translateY(0);}
  .btn-primary:disabled{background:#C3D0DE;color:#fff;cursor:not-allowed;box-shadow:none;}

  /* Result */
  .result{margin-top:24px;display:none;}
  .result.visible{display:block;}
  @keyframes popIn{from{opacity:0;transform:translateY(16px) scale(.985);}to{opacity:1;transform:none;}}

  .result-card{
    background:var(--surface);border:1px solid var(--border);border-radius:18px;
    padding:30px;box-shadow:var(--shadow-lg);margin-bottom:16px;
  }
  .result.visible .result-card{animation:popIn .55s var(--ease-out);}
  .result-head{
    display:flex;justify-content:space-between;align-items:flex-start;
    margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid var(--border);
  }
  .result-head .nf-info{font-size:13px;color:var(--ink-soft);letter-spacing:-.005em;}
  .result-head .nf-info b{color:var(--ink);font-weight:600;}
  .result-head .carrier-tag{
    display:inline-block;padding:5px 12px;border-radius:980px;
    font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  }
  .carrier-tag.FITLOG{background:rgba(90,158,47,.12);color:var(--fitlog);}
  .carrier-tag.MIRA{background:rgba(196,76,130,.12);color:var(--mira);}

  .status-block{text-align:center;padding:18px 0 6px;}
  .status-label{font-size:12px;text-transform:uppercase;color:var(--ink-mute);letter-spacing:.06em;margin-bottom:12px;font-weight:600;}
  .status-text{font-size:27px;font-weight:700;color:var(--ink);letter-spacing:-.6px;line-height:1.2;}
  .status-text.success{color:var(--success);}
  .status-text.warning{color:var(--warning);}
  .status-text.danger{color:var(--danger);}

  /* Detail rows */
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px;}
  .detail{
    background:var(--tint);border:1px solid var(--border);border-radius:13px;padding:15px 16px;
    opacity:0;transform:translateY(8px);
  }
  .detail.full{grid-column:1 / -1;}
  .result.visible .detail{animation:rise .5s var(--ease-out) forwards;}
  .result.visible .detail:nth-child(1){animation-delay:.12s;}
  .result.visible .detail:nth-child(2){animation-delay:.18s;}
  .result.visible .detail:nth-child(3){animation-delay:.24s;}
  .result.visible .detail:nth-child(4){animation-delay:.30s;}
  .detail-label{font-size:11px;text-transform:uppercase;color:var(--ink-mute);letter-spacing:.04em;font-weight:600;margin-bottom:5px;}
  .detail-value{font-size:14px;color:var(--ink);font-weight:600;letter-spacing:-.005em;}
  .detail-value.empty{color:var(--ink-mute);font-weight:400;}

  /* Timeline */
  .timeline-card{
    background:var(--surface);border:1px solid var(--border);border-radius:18px;
    padding:30px;box-shadow:var(--shadow);
  }
  .result.visible .timeline-card{animation:popIn .55s var(--ease-out) .1s both;}
  .timeline-title{font-size:12px;text-transform:uppercase;color:var(--ink-mute);letter-spacing:.06em;font-weight:600;margin-bottom:22px;}
  .timeline{position:relative;padding-left:24px;}
  .timeline::before{
    content:'';position:absolute;left:5px;top:6px;bottom:6px;width:2px;
    background:var(--border-strong);border-radius:2px;
  }
  .ev{position:relative;padding:0 0 24px 20px;}
  .ev:last-child{padding-bottom:0;}
  .ev::before{
    content:'';position:absolute;left:-24px;top:3px;width:12px;height:12px;border-radius:50%;
    background:var(--surface);border:2px solid var(--border-strong);z-index:1;
  }
  .ev.latest::before{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px rgba(31,92,153,.18);}
  .ev.success::before{background:var(--success);border-color:var(--success);box-shadow:0 0 0 4px rgba(31,138,91,.18);}
  .ev.danger::before{background:var(--danger);border-color:var(--danger);box-shadow:0 0 0 4px rgba(214,69,69,.18);}
  .ev .head{font-size:15px;font-weight:600;letter-spacing:-.2px;line-height:1.3;color:var(--ink);margin-bottom:5px;}
  .ev.latest .head{color:var(--accent);}
  .ev.success .head{color:var(--success);}
  .ev.danger .head{color:var(--danger);}
  .ev .meta{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);margin-bottom:6px;letter-spacing:-.005em;}
  .ev .meta .sep{color:var(--ink-mute);}
  .ev .desc{font-size:13px;color:var(--ink-soft);line-height:1.5;letter-spacing:-.005em;}

  /* Error */
  .error-card{
    background:rgba(214,69,69,.06);border:1px solid rgba(214,69,69,.26);
    border-radius:14px;padding:18px 20px;color:var(--danger);font-size:14px;line-height:1.5;font-weight:500;
    margin-top:24px;display:none;
  }
  .error-card.visible{display:block;animation:popIn .4s var(--ease-out);}

  /* Spinner */
  .loading{display:none;text-align:center;padding:36px 0;}
  .loading.visible{display:block;animation:popIn .4s var(--ease-out);}
  .spinner{
    width:30px;height:30px;border:2.5px solid var(--border-strong);
    border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:13px;color:var(--ink-soft);letter-spacing:-.005em;}

  /* Footer */
  .footer{text-align:center;margin-top:44px;font-size:12px;color:var(--ink-mute);letter-spacing:-.005em;}

  @media (max-width:600px){
    .container{padding:36px 16px 60px;}
    .header h1{font-size:32px;}
    .header p{font-size:14px;}
    .card{padding:22px;}
    .result-card,.timeline-card{padding:22px;}
    .input-row{flex-direction:column;}
    .btn-primary{width:100%;}
    .detail-grid{grid-template-columns:1fr;}
    .status-text{font-size:22px;}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-delay:0s!important;}
    .reveal{opacity:1;transform:none;}
    .detail{opacity:1;transform:none;}
    #intro{display:none;}
  }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-mark">
    <span class="wm">Luuna<svg class="moon" viewBox="0 0 100 100"><path d="M82 54a36 36 0 1 1-26-35 28 28 0 1 0 26 35z" fill="#F5C53D"/></svg></span>
  </div>
  <div class="intro-sub">Acorde melhor</div>
  <div class="intro-bar"><i></i></div>
</div>

<div class="bg-blobs" aria-hidden="true">
  <span class="b1"></span>
  <span class="b2"></span>
  <span class="b3"></span>
</div>

<div class="container">

  <div class="brand reveal" style="--d:.05s">
    <span class="wm">Luuna<svg class="moon" viewBox="0 0 100 100"><path d="M82 54a36 36 0 1 1-26-35 28 28 0 1 0 26 35z" fill="#F5C53D"/></svg></span>
    <span class="sep"></span>
    <span class="kicker">Logística</span>
  </div>

  <div class="header">
    <h1 class="reveal" style="--d:.12s">Rastreio de Pedidos</h1>
    <p class="reveal" style="--d:.2s">Acompanhe o status do seu pedido em tempo real.</p>
  </div>

  <div class="card reveal" style="--d:.3s">
    <label class="label">Transportadora</label>
    <div class="carrier-grid">
      <button class="carrier-btn active" data-carrier="FITLOG" onclick="selecionarCarrier('FITLOG')">
        <span class="dot"></span>
        <span class="name">Fitlog</span>
      </button>
      <button class="carrier-btn" data-carrier="MIRA" onclick="selecionarCarrier('MIRA')">
        <span class="dot"></span>
        <span class="name">Mira</span>
      </button>
    </div>

    <label class="label" for="inputNF">Número da Nota Fiscal</label>
    <div class="input-row">
      <input type="text" id="inputNF" class="input-nf" placeholder="Ex: 99812" inputmode="numeric" autocomplete="off"/>
      <button class="btn-primary" id="btnRastrear" onclick="rastrear()">Rastrear</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Consultando transportadora e buscando histórico…</div>
  </div>

  <div class="error-card" id="errorCard"></div>

  <div class="result" id="result">
    <!-- Resumo do envio -->
    <div class="result-card">
      <div class="result-head">
        <div class="nf-info">
          NF <b id="resNF">—</b>
        </div>
        <span class="carrier-tag" id="resCarrier">—</span>
      </div>

      <div class="status-block">
        <div class="status-label">Status atual</div>
        <div class="status-text" id="resStatus">—</div>
      </div>

      <div class="detail-grid">
        <div class="detail">
          <div class="detail-label">Última atualização</div>
          <div class="detail-value" id="resDataHora">—</div>
        </div>
        <div class="detail">
          <div class="detail-label">Previsão de entrega</div>
          <div class="detail-value" id="resPrevisao">—</div>
        </div>
        <div class="detail full" id="tileRemetente">
          <div class="detail-label">Remetente</div>
          <div class="detail-value" id="resRemetente">—</div>
        </div>
        <div class="detail full" id="tileDestinatario">
          <div class="detail-label">Destinatário</div>
          <div class="detail-value" id="resDestinatario">—</div>
        </div>
      </div>
    </div>

    <!-- Linha do tempo -->
    <div class="timeline-card" id="timelineCard" style="display:none;">
      <div class="timeline-title">Histórico de movimentações</div>
      <div class="timeline" id="timeline"></div>
    </div>
  </div>

  <div class="footer reveal" style="--d:.4s">Luuna · <span id="ts"></span></div>

</div>

<script>
  /* ── Intro reveal ── */
  (function intro(){
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce){ document.body.classList.add("revealed"); return; }
    window.addEventListener("load", () => {
      setTimeout(() => {
        document.body.classList.add("revealed");
        document.getElementById("intro").classList.add("done");
      }, 2050);
    });
    // safety fallback if 'load' is slow
    setTimeout(() => {
      if(!document.body.classList.contains("revealed")){
        document.body.classList.add("revealed");
        document.getElementById("intro").classList.add("done");
      }
    }, 3200);
  })();

  /* ── Tracking logic ── */
  let carrierSelecionada = "FITLOG";

  function selecionarCarrier(carrier) {
    carrierSelecionada = carrier;
    document.querySelectorAll(".carrier-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.carrier === carrier);
    });
  }

  document.getElementById("inputNF").addEventListener("keydown", (e) => {
    if (e.key === "Enter") rastrear();
  });

  async function rastrear() {
    const nf = document.getElementById("inputNF").value.trim().replace(/\D/g, "");
    if (!nf) { mostrarErro("Digite o número da nota fiscal"); return; }

    document.getElementById("result").classList.remove("visible");
    document.getElementById("errorCard").classList.remove("visible");
    document.getElementById("loading").classList.add("visible");
    document.getElementById("btnRastrear").disabled = true;

    try {
      const url = `/api/rastrear?carrier=${carrierSelecionada}&nf=${encodeURIComponent(nf)}`;
      const resp = await fetch(url);
      const data = await resp.json();

      document.getElementById("loading").classList.remove("visible");
      document.getElementById("btnRastrear").disabled = false;

      if (!data.ok) { mostrarErro(data.erro || "Erro desconhecido"); return; }
      mostrarResultado(data);
    } catch (err) {
      document.getElementById("loading").classList.remove("visible");
      document.getElementById("btnRastrear").disabled = false;
      mostrarErro("Falha ao consultar: " + err.message);
    }
  }

  function mostrarResultado(data) {
    document.getElementById("resNF").textContent      = data.nf;
    document.getElementById("resCarrier").textContent = data.carrier;
    document.getElementById("resCarrier").className   = "carrier-tag " + data.carrier;

    // Status atual = último evento (ou statusAtual quando não tem timeline)
    const last = data.statusAtual || (data.eventos && data.eventos.length ? data.eventos[data.eventos.length - 1] : null);
    const statusTxt = last ? last.situacao : "—";

    const statusEl = document.getElementById("resStatus");
    statusEl.textContent = statusTxt;
    statusEl.className = "status-text " + classeDoStatus(statusTxt);

    setValue("resDataHora",     last ? last.dataHora : "");
    setValue("resPrevisao",     data.previsao);
    setValue("resRemetente",    data.remetente);
    setValue("resDestinatario", data.destinatario);

    // Esconde tiles vazios
    document.getElementById("tileRemetente").style.display    = data.remetente    ? "" : "none";
    document.getElementById("tileDestinatario").style.display = data.destinatario ? "" : "none";

    // Timeline
    const timeline = document.getElementById("timeline");
    timeline.innerHTML = "";
    const timelineCard = document.getElementById("timelineCard");

    if (data.eventos && data.eventos.length > 0) {
      // mais recente em cima
      const eventosOrdenados = [...data.eventos].reverse();

      eventosOrdenados.forEach((ev, idx) => {
        const div = document.createElement("div");
        div.className = "ev " + classeDoEvento(ev.situacao, idx === 0);

        const local = [ev.unidade, ev.filial].filter(Boolean).join(" · ");

        div.innerHTML = `
          <div class="head">${escapeHtml(ev.situacao || "—")}</div>
          <div class="meta">
            <span>${escapeHtml(ev.dataHora || "")}</span>
            ${local ? `<span class="sep">·</span><span>${escapeHtml(local)}</span>` : ""}
          </div>
          ${ev.descricao ? `<div class="desc">${escapeHtml(ev.descricao)}</div>` : ""}
        `;
        timeline.appendChild(div);
      });

      timelineCard.style.display = "";
    } else {
      timelineCard.style.display = "none";
    }

    // re-trigger entrance animation
    const r = document.getElementById("result");
    r.classList.remove("visible"); void r.offsetWidth; r.classList.add("visible");
  }

  function classeDoStatus(s) {
    const u = (s || "").toUpperCase();
    if (/ENTREG/.test(u) && !/N[AÃ]O/.test(u)) return "success";
    if (/RECUSA|NAO PODE|N[AÃ]O PODE|CANCEL|EXTRAVIO|AVARIA|DEVOLU/.test(u)) return "danger";
    if (/ROTA|SAIDA|SA[ÍI]DA|TR[AÂ]NSITO/.test(u)) return "success";
    if (/N[AÃ]O DISPON[IÍ]V/.test(u)) return "warning";
    return "";
  }

  function classeDoEvento(situacao, isLatest) {
    const cls = classeDoStatus(situacao);
    if (cls === "success" || cls === "danger") return cls;
    if (isLatest) return "latest";
    return "";
  }

  function setValue(id, val) {
    const el = document.getElementById(id);
    if (val && String(val).trim()) {
      el.textContent = val;
      el.classList.remove("empty");
    } else {
      el.textContent = "Não informado";
      el.classList.add("empty");
    }
  }

  function mostrarErro(msg) {
    const el = document.getElementById("errorCard");
    el.textContent = "✗ " + msg;
    el.classList.remove("visible"); void el.offsetWidth; el.classList.add("visible");
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
    }[c]));
  }

  document.getElementById("ts").textContent = new Date().getFullYear();
</script>

</body>
</html>
